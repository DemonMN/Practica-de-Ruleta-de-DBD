        <style>

            body{
                margin: 0;
                height: 100vh;
                background: green;
                background-size: cover;
                background-position: center;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                color: white;
                font-family: Arial;
                background-image: url(Plantilla/Plantilla.png);
            }
            #dado{
                width: 150px;
                cursor: pointer;
                transition: 0.2s;
            }
            #dado:hover{
                transform:scale(1.15);
            }
            #dado:active{
                transform: scale(0.9);
            }

            #killerImg{
                width: 350px;
                display: none;
                margin-top: 50px;
                filter: drop-shadow(0 0 15px crimson)
                drop-shadow(0 0 25px rgb(39, 3, 10))
                drop-shadow(0 0 40px rgb(39, 3, 10));
            }

            @font-face {
                font-family: "DBDFont";
                src: url(Fuente/fuente5.ttf);
            }

            #killerNombre{
                color: rgb(135, 13, 13);
                font-size: 50px;
                margin-top: 30px;
                text-align: center;
                width: 100%;
                word-wrap: break-word;
                font-family: "DBDFont";
                letter-spacing: 4px;
            }

            #resultado{
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 300px;
                text-shadow: 
                0 0 5px white,
                0 0 10px white,
                0 0 20px white,
                2px 2px 0 black,
                -2px -2px 0 black,
                2px 2px 0 black,
                -2px -2px 0 black;
            }

        </style>
    </head>
