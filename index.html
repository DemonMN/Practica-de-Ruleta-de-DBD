                margin: 0;

                background-size: cover;
                background-position: center;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                color: white;
                font-family: Arial;
            }
            #dado{
                width: 150px;
                cursor: pointer;
                transition: 0.2s;
            }
            #dado:hover{
                transform:scale(1.15);
            }
            #dado:active{
                transform: scale(0.9);
            }
            

            #killerImg{
                margin-top: 30px;
                width: 300px;
                display: none;
                border-radius: 10px;
            }

            #killerNombre{
                color: red;
                font-size: 35px;
                margin-top: 15px;
                text-align: center;
                width: 100%;
                word-wrap: break-word;
            }

            #resultado{
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 300px;
            }

        </style>
    </head>

        let girando = false;
            function tirar(){

             if(girando) return;
                girando = true;
                
                document.getElementById("dado").style.display = "none";
                document.getElementById("killerImg").style.cursor = "default";

                let duracion = 8000
                let inicio = null;
                let ultimoCambio = 0;

                function animar(timestamp) {
                    if(!inicio) inicio = timestamp;
                    let proceso = timestamp - inicio;
                    if(proceso - ultimoCambio > 60){
                        ultimoCambio = proceso;

                    let random = Math.floor(Math.random()*killers.length);
                    let killer = killers[random];

                    document.getElementById("killerImg").src = killer.imagen;
                    document.getElementById("killerImg").style.display = "block";
                    document.getElementById("killerNombre").innerText = killer.nombre;
                    }

                    if(proceso < duracion){
                        requestAnimationFrame(animar);

                    }else{
                            girando = false;
                            document.getElementById("killerImg").style.cursor = "pointer";
                        }
                    }
                    requestAnimationFrame(animar);
                }
        </script>
